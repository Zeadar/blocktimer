# blocktimer example configuration
# Supported keys inside each [block]:
#   start=HH:MM
#   stop=HH:MM
#   domain+=example.com
#   ipv4+=1.2.3.4
#   ipv4+=10.0.0.0/24
#   ipv6+=2001:db8::1
#   ipv6+=2001:db8::/64
#   skipdays=[1,2,3,4,5,6,7]   # 1=Mon ... 7=Sun

[block]
# Example 1: Standard same-day window (start < stop)
start   = 09:00
stop    = 17:00
domain += youtube.com
domain += example.com

[block]
# Example 2: Midnight wraparound (start > stop)
start   = 22:00
stop    = 06:00
domain += reddit.com
domain += discord.com

[block]
# Example 3: 24/7 block (start == stop)
start   = 00:00
stop    = 00:00
domain += facebook.com

[block]
# Example 4: IPv4 and IPv6 host entries
start  = 08:00
stop   = 20:00
ipv4  += 1.1.1.1
ipv4  += 8.8.8.8
ipv6  += 2606:4700:4700::1111
ipv6  += 2001:4860:4860::8888

[block]
# Example 5: IPv4 and IPv6 CIDR subnet entries
start  = 10:00
stop   = 18:00
ipv4  += 10.0.0.0/24
ipv4  += 192.168.100.0/24
ipv6  += 2001:db8::/64
ipv6  += fd00:1234::/48

[block]
# Example 6: Mixed domains + IPs + subnets in one block
start   = 07:30
stop    = 21:45
domain += example.com
ipv4   += 203.0.113.10
ipv4   += 198.51.100.0/24
ipv6   += 2001:db8:abcd::10
ipv6   += 2001:db8:abcd::/64

[block]
# Example 7: Skip weekends (Saturday, Sunday)
start    = 09:00
stop     = 17:00
domain  += work-distraction.example
skipdays = [6,7]

[block]
# Example 8: Skip weekdays (only active on weekends)
start    = 12:00
stop     = 23:00
domain  += weekend-only.example
skipdays = [1,2,3,4,5]

[block]
# Example 9: Skip specific days
start    = 18:00
stop     = 23:30
domain  += gaming.example
skipdays = [3,5,7]
